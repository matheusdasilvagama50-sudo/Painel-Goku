<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Goku</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
color:#fff;
overflow:hidden;
}

.sidebar{
position:fixed;
left:0;
top:0;
width:250px;
height:100%;
background:#111;
padding:20px;
border-right:2px solid #a200ff;
}

.profile{
text-align:center;
margin-bottom:30px;
}

.profile img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #a200ff;
box-shadow:0 0 20px #a200ff;
}

.profile h1{
margin-top:15px;
}

.menu button{
width:100%;
padding:15px;
margin-bottom:15px;
border:none;
border-radius:14px;
background:#1a1a1a;
color:#fff;
cursor:pointer;
font-weight:600;
}

.menu button i{
margin-right:10px;
color:#d000ff;
}

.main{
margin-left:270px;
padding:30px;
}

.inject-box{
background:#111;
padding:25px;
border-radius:20px;
border:2px solid #a200ff;
}

.terminal{
width:100%;
height:250px;
background:#000;
border-radius:12px;
padding:15px;
overflow:auto;
font-family:monospace;
color:#00ff99;
margin-bottom:20px;
border:1px solid #00ff99;
}

.inject-btn,
.open-btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
font-weight:700;
color:#fff;
cursor:pointer;
}

.inject-btn{
background:linear-gradient(90deg,#7b00ff,#d000ff);
}

.open-btn{
background:linear-gradient(90deg,#ff6600,#ff9900);
}

</style>

</head>

<body>

<div class="sidebar">

<div class="profile">

<img src="https://raw.githubusercontent.com/matheusdasilvagama50-sudo/Teste-Garena/main/file_0000000065ec720eb50430b0cefab549.png">

<h1>Painel Goku</h1>

</div>

<div class="menu">

<button><i class="fa-solid fa-house"></i>Início</button>

<button><i class="fa-solid fa-bolt"></i>Status</button>

<button><i class="fa-solid fa-dragon"></i>Anime</button>

<button><i class="fa-solid fa-gear"></i>Config</button>

</div>

</div>

<div class="main">

<div class="inject-box">

<h2>PAINEL GOKU</h2>

<div class="terminal" id="terminal">

<span>> Sistema iniciado...</span>

</div>

<button class="inject-btn" onclick="injetar()">
INJETAR
</button>

<button class="open-btn" onclick="abrirFF()">
ABRIR FREE FIRE
</button>

</div>

</div>

<script>

function injetar(){

const terminal = document.getElementById("terminal");

const linhas = [

"> Inicializando...",
"> Carregando assets...",
"> Renderizando HUD...",
"> Sistema online.",
"> Painel iniciado."

];

terminal.innerHTML = "";

let i = 0;

const intervalo = setInterval(()=>{

if(i >= linhas.length){

clearInterval(intervalo);

return;

}

terminal.innerHTML += `<div>${linhas[i]}</div>`;

terminal.scrollTop = terminal.scrollHeight;

i++;

},700);

}

function abrirFF(){

window.open("https://ff.garena.com","_blank");

}

</script>

</body>
</html>
