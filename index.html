<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Goku</title>

<link rel="manifest" href="manifest.json">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="./style.css">

<meta name="theme-color" content="#a200ff">

</head>

<body>

<!-- FUNDO -->

<div class="bg"></div>

<!-- LOGIN -->

<div class="login-box">

<img 
class="avatar"
src="https://raw.githubusercontent.com/matheusdasilvagama50-sudo/Teste-Garena/main/file_0000000065ec720eb50430b0cefab549.png"
>

<div class="title">
Painel Goku
</div>

<div class="sub">
Criador do Painel: Magnata
</div>

<div class="input-box">
<input type="text" placeholder="Usuário">
</div>

<div class="input-box">
<input type="password" placeholder="Senha">
</div>

<button class="btn" onclick="abrirPopup()">
ENTRAR
</button>

<div class="info">

Modelo:
<span>Painel Goku</span>

<br>

Tema Neon Anime Roxo

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<h2>
Permissões Necessárias
</h2>

<p>

• Sobreposição do Painel
<br>

• Armazenamento
<br>

• Notificações

<br><br>

Ative todas as permissões para continuar.

</p>

<button onclick="fecharPopup()">
CONTINUAR
</button>

</div>

<!-- INSTALAR APP -->

<div class="install-box" id="installBox" style="display:none;">

<h3>
Instalar Painel Goku
</h3>

<p>
Adicione o Painel Goku na tela inicial para usar como aplicativo.
</p>

<button id="installBtn">
ADICIONAR À TELA INICIAL
</button>

</div>

<!-- SCRIPT -->

<script src="./script.js"></script>

</body>
</html>
