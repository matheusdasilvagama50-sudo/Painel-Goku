<!-- permissions.html -->

<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Permissões</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
width:340px;
background:#111;
border:2px solid #a200ff;
border-radius:20px;
padding:30px;
box-shadow:0 0 30px #a200ff88;
animation:fade 1s ease;
}

.title{
text-align:center;
color:#fff;
font-size:28px;
font-weight:700;
margin-bottom:20px;
}

.permission{
background:#1a1a1a;
padding:15px;
border-radius:12px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
color:#fff;
}

.permission button{
background:#a200ff;
border:none;
padding:8px 15px;
border-radius:8px;
color:#fff;
font-weight:600;
cursor:pointer;
}

.permission button:hover{
box-shadow:0 0 15px #a200ff;
}

.finish{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7b00ff,#d000ff);
color:#fff;
font-size:16px;
font-weight:700;
cursor:pointer;
margin-top:10px;
}

.finish:hover{
box-shadow:0 0 20px #a200ff;
}

.text{
color:#aaa;
text-align:center;
font-size:13px;
margin-top:20px;
line-height:22px;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="container">

<div class="title">
Painel Goku
</div>

<div class="permission">
<span>Sobreposição</span>
<button onclick="ativar(this)">
Ativar
</button>
</div>

<div class="permission">
<span>Armazenamento</span>
<button onclick="ativar(this)">
Ativar
</button>
</div>

<div class="permission">
<span>Notificações</span>
<button onclick="ativar(this)">
Ativar
</button>
</div>

<button class="finish" onclick="finalizar()">
FINALIZAR
</button>

<div class="text">
Criador do Painel: Magnata
</div>

</div>

<script>

function ativar(btn){

btn.innerHTML = "ATIVADO";
btn.style.background = "#00ff99";

}

function finalizar(){

alert("Permissões ativadas com sucesso!");

window.location.href = "index.html";

}

</script>

</body>
</html>
