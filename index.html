<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="theme-color" content="#a200ff">

<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="Painel Goku">

<title>Painel Goku</title>

<!-- MANIFEST -->

<link rel="manifest" href="./manifest.json">

<!-- FONTS -->

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- CSS -->

<link rel="stylesheet" href="./style.css">

<!-- ÍCONE -->

<link rel="icon" href="https://raw.githubusercontent.com/matheusdasilvagama50-sudo/Teste-Garena/main/file_0000000065ec720eb50430b0cefab549.png">

</head>

<body>

<!-- FUNDO -->

<div class="bg"></div>

<!-- LOGIN -->

<div class="login-box">

<!-- FOTO -->

<img 
class="avatar"
src="https://raw.githubusercontent.com/matheusdasilvagama50-sudo/Teste-Garena/main/file_0000000065ec720eb50430b0cefab549.png"
>

<!-- TÍTULO -->

<div class="title">
Painel Goku
</div>

<!-- SUB -->

<div class="sub">
Criador do Painel: Magnata
</div>

<!-- INPUT -->

<div class="input-box">
<input type="text" placeholder="Usuário">
</div>

<div class="input-box">
<input type="password" placeholder="Senha">
</div>

<!-- BOTÃO -->

<button class="btn" onclick="abrirPopup()">
ENTRAR
</button>

<!-- INFO -->

<div class="info">

Modelo:
<span>Painel Goku</span>

<br>

Tema Neon Anime Roxo

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<h2>
Permissões Necessárias
</h2>

<p>

• Sobreposição do Painel
<br>

• Armazenamento
<br>

• Notificações

<br><br>

Ative todas as permissões para continuar.

</p>

<button onclick="fecharPopup()">
CONTINUAR
</button>

</div>

<!-- INSTALAR APP -->

<div class="install-box" id="installBox" style="display:none;">

<h3>
Instalar Painel Goku
</h3>

<p>
Adicione o Painel Goku na tela inicial para usar como aplicativo.
</p>

<button id="installBtn">
ADICIONAR À TELA INICIAL
</button>

</div>

<!-- SCRIPT PRINCIPAL -->

<script src="./script.js"></script>

<!-- SERVICE WORKER -->

<script>

if("serviceWorker" in navigator){

window.addEventListener("load",()=>{

navigator.serviceWorker.register("./service-worker.js")

.then((registration)=>{

console.log("Service Worker registrado");

})

.catch((error)=>{

console.log("Erro Service Worker:",error);

});

});

}

</script>

</body>
</html>
