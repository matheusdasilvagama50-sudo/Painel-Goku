<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Goku</title>

<link rel="manifest" href="./manifest.json">

<link rel="stylesheet" href="./style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<meta name="theme-color" content="#a200ff">

</head>

<body>

<div class="bg"></div>

<div class="login-box">

<img class="avatar"
src="https://raw.githubusercontent.com/matheusdasilvagama50-sudo/Teste-Garena/main/file_0000000065ec720eb50430b0cefab549.png">

<div class="title">
Painel Goku
</div>

<div class="sub">
Criador: Magnata
</div>

<div class="input-box">
<input type="text" placeholder="Usuário">
</div>

<div class="input-box">
<input type="password" placeholder="Senha">
</div>

<button class="btn" onclick="abrirPopup()">
ENTRAR
</button>

</div>

<div class="popup" id="popup">

<h2>Permissões</h2>

<p>
• Sobreposição<br>
• Armazenamento<br>
• Notificações
</p>

<button onclick="fecharPopup()">
CONTINUAR
</button>

</div>

<div class="install-box" id="installBox" style="display:none;">

<h3>Instalar App</h3>

<p>
Adicionar Painel Goku na tela inicial.
</p>

<button id="installBtn">
INSTALAR
</button>

</div>

<script src="./script.js"></script>

<script>

if("serviceWorker" in navigator){

navigator.serviceWorker.register("./service-worker.js");

}

</script>

</body>
</html>
